spring:
  datasource:
    url: jdbc:mysql://localhost:3306/appspaces?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: your-db-password
    driver-class-name: com.mysql.cj.jdbc.Driver

aliyun:
  oss:
    endpoint: oss-cn-shenzhen.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name
    custom-domain: https://your-cdn-domain.com

appspaces:
  base-url: https://your-domain.com
  admin:
    username: admin
    password: your-admin-password
  jwt:
    secret: your-jwt-secret-at-least-32-chars
    expire-hours: 24
  api-token: your-ci-cd-api-token
